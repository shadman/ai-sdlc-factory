services:
  # --- STAGE 1: E-COMMERCE CORE (Always On) ---
  db:
    image: postgres:15-alpine
    container_name: eco-db
    networks: [ai-factory-net]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce
    ports: ["5432:5432"]
    deploy:
      resources:
        limits: { memory: 512M }

  backend-api:
    build: ./backend
    container_name: eco-backend
    networks: [ai-factory-net]
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/ecommerce
    deploy:
      resources:
        limits: { memory: 1G }

  frontend-ui:
    build: ./frontend
    container_name: eco-frontend
    networks: [ai-factory-net]
    ports: ["4200:4200"]
    deploy:
      resources:
        limits: { memory: 512M }

  # --- STAGE 2: AI FACTORY (On-Demand / Memory Intensive) ---
  ollama:
    image: ollama/ollama
    container_name: ai-brain
    networks: [ai-factory-net]
    profiles: ["ai"]
    volumes: ["./data/ollama:/root/.ollama"]
    ports: ["11434:11434"]
    deploy:
      resources:
        limits: { memory: 6G }

  redis:
    image: redis:alpine
    container_name: ai-state
    networks: [ai-factory-net]
    profiles: ["ai"]
    deploy:
      resources:
        limits: { memory: 256M }

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ai-observability
    networks: [ai-factory-net]
    profiles: ["ai"]
    ports: ["6006:6006"]
    deploy:
      resources:
        limits: { memory: 1G }

  ai-squad:
    build:
      context: ./ai-agents-core
      dockerfile: Dockerfile
    container_name: ai-squad
    networks: [ai-factory-net]
    profiles: ["ai"]
    ports: ["8000:8000"] # Needed for Jira Webhook listener
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:4317
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - JIRA_DOMAIN=${JIRA_DOMAIN}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
    volumes:
      - ./backend:/app/repos/backend
      - ./frontend:/app/repos/frontend
    depends_on: [ollama, redis, phoenix]
    deploy:
      resources:
        limits: { memory: 2G }

networks:
  ai-factory-net:
    driver: bridge