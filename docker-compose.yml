services:
  # --- STAGE 1: E-COMMERCE CORE (Always On) ---
  db:
    image: postgres:15-alpine
    container_name: eco-db
    networks: [ai-factory-net]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce
    ports: ["5432:5432"]
    deploy:
      resources:
        limits: { memory: 512M }

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco-backend
    networks: [ai-factory-net]
    ports: ["8080:8080"]
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/ecommerce
    command: ["bash", "-c", "echo 'backend-api: add your start command here'"]
    deploy:
      resources:
        limits: { memory: 1G }

  frontend-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco-frontend
    networks: [ai-factory-net]
    ports: ["4200:4200"]
    command: ["bash", "-c", "echo 'frontend-ui: add your start command here'"]
    deploy:
      resources:
        limits: { memory: 512M }

  # --- STAGE 2: AI FACTORY (On-Demand / Memory Intensive) ---
  # NOTE: Ollama  -> see ollama/docker-compose.yml   (set OLLAMA_HOST in .env)
  # NOTE: Phoenix -> see phoenix/docker-compose.yml  (set PHOENIX_ENDPOINT in .env)

  # AI Agent service
  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-api
    networks: [ai-factory-net]
    profiles: ["ai"]
    ports: ["9000:9000"]
    env_file: ./.env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}   # set in .env — local: http://localhost:11434, HF: https://your-space.hf.space
      - REDIS_URL=${REDIS_URL}
      - PHOENIX_COLLECTOR_ENDPOINT=${PHOENIX_ENDPOINT}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - JIRA_DOMAIN=${JIRA_DOMAIN}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - BACKEND_REPO_URL=${BACKEND_REPO_URL}
      - FRONTEND_REPO_URL=${FRONTEND_REPO_URL}
      - CREWAI_TRACING_ENABLED=false
      - OTEL_SDK_DISABLED=true
      - CREWAI_STORAGE_DIR=/tmp/crewai
    # Volumes for local dev only — on Hugging Face, entrypoint.sh clones the repos instead
    volumes:
      - ./backend:/app/repos/backend
      - ./frontend:/app/repos/frontend
    command: ["bash", "-c", "cd /app/ai-agents-core && uvicorn agents_api:app --host 0.0.0.0 --port 9000"]
    deploy:
      resources:
        limits: { memory: 2G }

networks:
  ai-factory-net:
    driver: bridge
