services:
  # --- STAGE 1: E-COMMERCE CORE (Always On) ---
  db:
    image: postgres:15-alpine
    container_name: eco-db
    networks: [ai-factory-net]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce
    ports: ["5432:5432"]
    deploy:
      resources:
        limits: { memory: 512M }

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco-backend
    networks: [ai-factory-net]
    ports: ["8080:8080"]
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/ecommerce
    command: ["bash", "-c", "echo 'backend-api: add your start command here'"]
    deploy:
      resources:
        limits: { memory: 1G }

  frontend-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco-frontend
    networks: [ai-factory-net]
    ports: ["4200:4200"]
    command: ["bash", "-c", "echo 'frontend-ui: add your start command here'"]
    deploy:
      resources:
        limits: { memory: 512M }

  # --- STAGE 2: AI FACTORY (On-Demand / Memory Intensive) ---
  ollama:
    image: ollama/ollama
    container_name: ai-brain
    networks: [ai-factory-net]
    profiles: ["ai"]
    volumes: ["./data/ollama:/root/.ollama"]
    ports: ["11434:11434"]
    deploy:
      resources:
        limits: { memory: 6G }

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ai-observability
    networks: [ai-factory-net]
    profiles: ["ai"]
    ports: ["6006:6006"]
    deploy:
      resources:
        limits: { memory: 1G }

  # AI Agent service — needs Ollama + Phoenix
  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-api
    networks: [ai-factory-net]
    profiles: ["ai"]
    ports: ["9000:9000"]
    env_file: ./.env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_URL=${REDIS_URL}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:4317
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - JIRA_DOMAIN=${JIRA_DOMAIN}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - BACKEND_REPO_URL=${BACKEND_REPO_URL}
      - FRONTEND_REPO_URL=${FRONTEND_REPO_URL}
    # Volumes for local dev only — on Hugging Face, entrypoint.sh clones the repos instead
    volumes:
      - ./backend:/app/repos/backend
      - ./frontend:/app/repos/frontend
    depends_on: [ollama, phoenix]
    command: ["bash", "-c", "cd /app/ai-agents-core && uvicorn agents_api:app --host 0.0.0.0 --port 9000"]
    deploy:
      resources:
        limits: { memory: 2G }

networks:
  ai-factory-net:
    driver: bridge
