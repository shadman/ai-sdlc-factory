name: Backend Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Push Docker Image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t your-registry/backend:${{ github.sha }} .
          docker push your-registry/backend:${{ github.sha }}

      - name: Notify Server to Update
        # This replaces your running container with the new image
        run: |
          curl -X POST ${{ secrets.DEPLOYMENT_WEBHOOK_URL }} \
               -d '{"image": "your-registry/backend:${{ github.sha }}", "service": "eco-backend"}'
